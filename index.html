function render(idx){
  currentWeek=idx;
  document.querySelectorAll('.week-btn').forEach(function(b,i){b.classList.toggle('active',i===idx)});
  var weeks=currentData(),w=weeks[idx],ti=trackInfo();
  var html='<div class="week-meta"><div class="week-label">Week '+w.week+'</div><span class="track-pill '+ti.cls+'">'+ti.text+'</span><p class="week-note">'+weekNote(w)+'</p></div>';
  w.days.forEach(function(day,di){
    html+='<div class="day-section"><div class="day-header"><div class="day-title">'+day.label+'</div></div>';
    day.sections.forEach(function(sec,si){
      html+='<div class="muscle-block"><div class="muscle-label">'+sec.muscle+'</div>';
      sec.exercises.forEach(function(ex,ei){
        var sets=setsFor(ex),note=noteFor(ex),cnt=parseSetCount(sets),exId=idx+'_'+di+'_'+si+'_'+ei;
        html+='<div class="exercise-item"><div class="ex-top"><a class="ex-link" href="'+ex.url+'" target="_blank" rel="noopener">'+ex.name+' ↗</a><div class="ex-sets-label">'+sets+'</div></div>';
        if(note) html+='<div class="ex-note">'+note+'</div>';
        html+='<button class="log-toggle" onclick="toggleLog(\''+exId+'\','+cnt+')">+ Log sets</button>';
        html+='<div class="log-area" id="log_'+exId+'" style="display:none"></div></div>';
      });
      html+='</div>';
    });
    html+='</div>';
  });
  document.getElementById('content').innerHTML=html;
  window.scrollTo(0,0);
}

function toggleLog(exId,cnt){
  var area=document.getElementById('log_'+exId),btn=area.previousElementSibling;
  if(area.style.display==='none'){area.style.display='block';btn.textContent='- Hide log';buildLogRows(exId,cnt);}
  else{area.style.display='none';btn.textContent='+ Log sets';}
}

function buildLogRows(exId,cnt){
  var area=document.getElementById('log_'+exId),html='<div class="set-rows">';
  for(var s=0;s<cnt;s++){
    var k=exId+'_'+s,saved=getLog(k);
    html+='<div class="set-row"><label>Set '+(s+1)+'</label>';
    html+='<input type="number" placeholder="lbs" value="'+saved.weight+'" min="0" step="2.5" oninput="setLog(\''+k+'\',\'weight\',this.value)" >';
    html+='<input type="number" placeholder="reps" value="'+saved.reps+'" min="0" step="1" oninput="setLog(\''+k+'\',\'reps\',this.value)" >';
    html+='<input type="checkbox" '+(saved.done?'checked':'')+' onchange="setLog(\''+k+'\',\'done\',this.checked)">';
    html+='<span class="done-label">done</span></div>';
  }
  html+='</div>';
  area.innerHTML=html;
}

function setGym(g){
  gym=g;
  document.getElementById('btn-db').classList.toggle('active',g==='db');
  document.getElementById('btn-gym').classList.toggle('active',g==='gym');
  buildWeekNav();render(0);
}

function setTrack(t){
  track=t;
  ['c','h','s'].forEach(function(x){
    var b=document.getElementById('btn-'+x);
    b.className='';
    if(x===t){b.classList.add('active');b.classList.add('t'+x);}
  });
  render(currentWeek);
}

function buildWeekNav(){
  var nav=document.getElementById('weekNav');nav.innerHTML='';
  for(var i=0;i<6;i++){
    (function(idx){
      var b=document.createElement('button');
      b.className='week-btn'+(idx===0?' active':'');
      b.textContent='Week '+(idx+1);
      b.onclick=function(){render(idx)};
      nav.appendChild(b);
    })(i);
  }
}

function showExport(){
  var lines=[],gl=gym==='db'?'Dumbbells':'Full Gym',tl=track==='c'?'Conditioning':track==='h'?'Hypertrophy':'Strength';
  lines.push('=== Workout Log — '+gl+' · '+tl+' ===\n');
  var weeks=currentData();
  weeks.forEach(function(w,wi){
    var hasData=false,wLines=['\n-- Week '+w.week+' --'];
    w.days.forEach(function(day,di){
      day.sections.forEach(function(sec,si){
        sec.exercises.forEach(function(ex,ei){
          var cnt=parseSetCount(setsFor(ex)),setData=[];
          for(var s=0;s<cnt;s++){
            var k=wi+'_'+di+'_'+si+'_'+ei+'_'+s,l=getLog(k);
            if(l.weight||l.reps||l.done) setData.push('  Set '+(s+1)+': '+(l.weight?l.weight+'lbs':'?lbs')+' x '+(l.reps?l.reps+' reps':'? reps')+(l.done?' done':''));
          }
          if(setData.length){hasData=true;wLines.push(ex.name);setData.forEach(function(s){wLines.push(s)});}
        });
      });
    });
    if(hasData) lines=lines.concat(wLines);
  });
  if(lines.length===1) lines.push('\nNo sets logged yet.');
  document.getElementById('exportText').textContent=lines.join('\n');
  document.getElementById('exportModal').classList.add('show');
}

function closeExport(){document.getElementById('exportModal').classList.remove('show')}
function copyLog(){
  var text=document.getElementById('exportText').textContent;
  navigator.clipboard.writeText(text).then(function(){
    var btn=document.querySelector('.modal-btns .primary');
    btn.textContent='Copied!';
    setTimeout(function(){btn.textContent='Copy to clipboard'},2000);
  });
}

render(0);
