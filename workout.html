<style>
  *{box-sizing:border-box;margin:0;padding:0}

  header{background:#fff;border-bottom:1px solid #e8e8e8;padding:16px 20px;position:sticky;top:0;z-index:10}
  header h1{font-size:17px;font-weight:600;letter-spacing:-0.3px}
  header p{font-size:12px;color:#888;margin-top:2px}
  .week-nav{display:flex;gap:6px;overflow-x:auto;padding:14px 20px;background:#fff;border-bottom:1px solid #e8e8e8;scrollbar-width:none}
  .week-nav::-webkit-scrollbar{display:none}
  .week-btn{flex-shrink:0;padding:7px 14px;font-size:13px;border-radius:20px;border:1px solid #ddd;background:transparent;color:#666;cursor:pointer;font-family:inherit;transition:all 0.15s}
  .week-btn.active{background:#1a1a1a;color:#fff;border-color:#1a1a1a}
  .main{padding:16px 20px 40px}
  .week-meta{margin-bottom:16px}
  .week-label{font-size:20px;font-weight:700;letter-spacing:-0.5px}
  .track-pill{display:inline-block;font-size:11px;font-weight:500;padding:3px 10px;border-radius:20px;margin-top:6px}
  .conditioning{background:#dcf5ea;color:#0a5c3a}
  .hypertrophy{background:#ede9fc;color:#3d2fa0}
  .week-note{font-size:13px;color:#666;margin-top:8px;line-height:1.5}
  .day-section{background:#fff;border-radius:14px;margin-bottom:12px;overflow:hidden;border:1px solid #e8e8e8}
  .day-header{padding:13px 16px;background:#f9f9f9;border-bottom:1px solid #e8e8e8}
  .day-title{font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:0.06em;color:#555}
  .muscle-block{padding:0 16px}
  .muscle-label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.06em;color:#aaa;padding:12px 0 6px}
  .exercise-row{display:flex;justify-content:space-between;align-items:flex-start;padding:10px 0;border-bottom:1px solid #f0f0f0;gap:10px}
  .exercise-row:last-child{border-bottom:none}
  .ex-left{flex:1;min-width:0}
  .ex-link{font-size:14px;color:#1a6fdc;text-decoration:none;font-weight:500;display:flex;align-items:center;gap:4px;line-height:1.3}
  .ex-link:active{opacity:0.7}
  .ex-ext{font-size:10px;opacity:0.5;flex-shrink:0}
  .ex-note{font-size:11px;color:#999;margin-top:3px;line-height:1.4;font-style:italic}
  .ex-sets{font-size:12px;color:#666;white-space:nowrap;padding-top:2px;text-align:right;min-width:80px;line-height:1.4}
</style>

const nav = document.getElementById('weekNav');
const content = document.getElementById('content');

function render(idx) {
  nav.querySelectorAll('.week-btn').forEach((b,i) => b.classList.toggle('active', i===idx));
  const w = WEEKS[idx];
  let html = `<div class="week-meta">
    <div class="week-label">Week ${w.week}</div>
    <span class="track-pill ${w.track}">${w.track === 'conditioning' ? 'Conditioning' : 'Hypertrophy'}</span>
    <p class="week-note">${w.note}</p>
  </div>`;
  w.days.forEach(day => {
    html += `<div class="day-section"><div class="day-header"><div class="day-title">${day.label}</div></div>`;
    day.sections.forEach(sec => {
      html += `<div class="muscle-block"><div class="muscle-label">${sec.muscle}</div>`;
      sec.exercises.forEach(ex => {
        html += `<div class="exercise-row">
          <div class="ex-left">
            <a class="ex-link" href="${ex.url}" target="_blank" rel="noopener">${ex.name} <span class="ex-ext">↗</span></a>
            ${ex.note ? `<div class="ex-note">${ex.note}</div>` : ''}
          </div>
          <div class="ex-sets">${ex.sets}</div>
        </div>`;
      });
      html += `</div>`;
    });
    html += `</div>`;
  });
  content.innerHTML = html;
  window.scrollTo(0,0);
}

for(let i=0;i<6;i++){
  const b = document.createElement('button');
  b.className = 'week-btn';
  b.textContent = `Week ${i+1}`;
  b.onclick = () => render(i);
  nav.appendChild(b);
}
